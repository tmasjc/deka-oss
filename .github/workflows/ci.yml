name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      # Format gate is disabled until the existing tree is reformatted.
      # Run `uv run ruff format .` and commit, then uncomment to enforce.
      # - name: Format check (ruff)
      #   run: uv run ruff format --check .

      - name: Tests (unit only; integration excluded by pyproject markers)
        run: uv run pytest

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build
